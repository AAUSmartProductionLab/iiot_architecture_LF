server.port=8081

# MVD: keep everything in memory. Swap to a MongoDB profile later for persistence.
basyx.backend=InMemory

# Allow the React dashboard (and aas-gui) to call the repository directly from the browser.
basyx.cors.allowed-origins=*
basyx.cors.allowed-methods=GET,POST,PATCH,PUT,DELETE,OPTIONS,HEAD

# Publish Submodel lifecycle events to MQTT (sm-repository/.../submodels/{created,updated,deleted})
# so the ingestor learns device AID schemas. Connection params live under mqtt.*.
basyx.submodelrepository.feature.mqtt.enabled=true
mqtt.clientId=basyx-submodel-repo
mqtt.hostname=hivemq
mqtt.port=1883
